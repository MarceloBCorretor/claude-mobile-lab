<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MultiIA</title>
<meta name="description" content="Chat com acesso exclusivo a modelos abertos de IA" />
<meta name="theme-color" content="#0e0a16" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MultiIA" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app-shell">
  <aside class="sidebar glass" id="sidebar">
    <button class="new-chat-btn" id="newChatBtn">+ Novo Chat</button>
    <div class="conversation-list" id="conversationList"></div>
    <div class="sidebar-footer">
      <span>MultiIA</span>
      <a href="admin.html">Admin</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar glass">
      <button class="icon-btn" id="toggleSidebarBtn" title="Mostrar/ocultar conversas">☰</button>
      <select id="modelSelect"></select>
      <select id="promptSelect">
        <option value="">Selecionar um Prompt</option>
      </select>
      <div class="spacer"></div>
    </div>

    <div class="status-banner glass" id="statusBanner" style="display:none;"></div>

    <div class="chat-scroll">
      <div class="chat-inner" id="chatInner">
        <div class="empty-state" id="emptyState">
          <h1>MultiIA</h1>
          <p>Converse com modelos abertos (GLM, Kimi, DeepSeek, Qwen, MiniMax) via OpenRouter.</p>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="attachments-row" id="attachmentsRow"></div>
      <div class="composer-inner glass">
        <button class="attach-btn" id="attachBtn" title="Anexar arquivo">📎</button>
        <input type="file" id="fileInput" accept="image/*,.txt,.md,.csv,.json,.pdf" multiple hidden />
        <textarea id="promptInput" rows="1" placeholder="Digite uma mensagem..."></textarea>
        <button class="send-btn" id="sendBtn" title="Enviar">➤</button>
      </div>
      <div class="hint">As respostas sao geradas por modelos de IA e podem conter erros.</div>
    </div>

    <nav class="bottom-nav glass">
      <button class="active" id="navChat"><span class="nav-icon">💬</span>Chat</button>
      <button id="navHistory"><span class="nav-icon">🕘</span>Histórico</button>
      <button id="navPrompts"><span class="nav-icon">✨</span>Prompts</button>
      <a href="admin.html"><span class="nav-icon">⚙️</span>Admin</a>
    </nav>
  </main>
</div>

<script src="js/pwa.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
